services:
  - type: web
    name: pos-backend
    runtime: node
    rootDir: pos-backend
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          type: web
          name: pos-frontend
          envVarKey: RENDER_EXTERNAL_URL
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false

  - type: web
    name: pos-frontend
    runtime: static
    rootDir: pos-frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_BACKEND_URL
        fromService:
          type: web
          name: pos-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_RAZORPAY_KEY_ID
        sync: false
