<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurant POS</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
      (function() {
        try {
          var lng = localStorage.getItem('i18nextLng') || 'en';
          var dir = (lng === 'ar') ? 'rtl' : 'ltr';
          document.documentElement.dir = dir;
          document.documentElement.lang = lng;
          // Apply theme synchronously too
          var theme = localStorage.getItem('theme-storage');
          if (theme) {
            var parsed = JSON.parse(theme);
            if (parsed && parsed.state && parsed.state.mode) {
              document.documentElement.setAttribute('data-theme', parsed.state.mode);
            }
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
